<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashir AI Lister - Ultimate v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .input-dark { background: #0f172a; border: 1px solid #1e293b; color: #fff; border-radius: 8px; padding: 10px 14px; }
        .preview-container { display: flex; justify-content: center; background: #0f172a; padding: 20px; }
        .ebay-preview-wrapper { width: 100%; max-width: 850px; background: #fff; color: #1a202c; border-radius: 8px; overflow: hidden; }
        #infographicCanvas { display: none; }
    </style>
</head>
<body x-data="generator()" class="overflow-hidden h-screen">
    <div class="h-full flex flex-col lg:flex-row">
        <div class="lg:w-2/5 xl:w-1/4 bg-[#020617] p-6 border-r border-slate-800 overflow-y-auto">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white">Hashir AI Lister</h1>
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Ultimate SEO v4.0</p>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Gemini API Key</label>
                    <input x-model="apiKey" type="password" placeholder="Enter API Key..." class="w-full input-dark text-xs">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Amazon/eBay Data</label>
                    <textarea x-model="rawInput" rows="5" placeholder="Paste Amazon data here..." class="w-full input-dark text-sm"></textarea>
                </div>
                <button @click="processWithAI()" :disabled="loading" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2">
                    <span x-text="loading ? 'Analyzing...' : '1. Generate SEO Listing'"></span>
                </button>
                <div class="pt-4 border-t border-slate-800 space-y-3">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">AI-Optimized Title</label>
                    <input x-model="title" type="text" maxlength="80" class="w-full input-dark text-sm text-indigo-400 font-bold">
                    <label class="block text-[10px] font-bold text-slate-500 uppercase">German Highlights</label>
                    <textarea x-model="description" rows="5" class="w-full input-dark text-xs"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button @click="handleImage('copy')" class="bg-orange-600 text-white font-bold py-3 rounded-xl text-[10px]">COPY IMAGE</button>
                    <button @click="handleImage('download')" class="bg-slate-700 text-white font-bold py-3 rounded-xl text-[10px]">SAVE IMAGE</button>
                </div>
                <button @click="copyToClipboard()" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl text-sm">COPY EBAY HTML</button>
            </div>
        </div>
        <div class="flex-1 bg-[#0f172a] overflow-y-auto">
            <div class="preview-container">
                <div class="ebay-preview-wrapper">
                    <div x-html="generateHTML()"></div>
                </div>
            </div>
        </div>
    </div>
    <canvas id="infographicCanvas" width="1200" height="1200"></canvas>

    <script>
        function generator() {
            return {
                apiKey: '', rawInput: '', loading: false, storeName: 'BazMart',
                title: 'AI SEO Title', description: '• Feature 1\n• Feature 2',
                images: [{url: 'https://m.media-amazon.com/images/I/81RmRTydVzL._AC_SL1500_.jpg'}],

                async processWithAI() {
                    if (!this.apiKey) return alert("Enter API Key");
                    this.loading = true;
                    const prompt = `Act as an expert German eBay SEO Manager. Generate a title MAX 80 chars and 5 bullet points in German. Input: ${this.rawInput} Response ONLY in JSON: {"title": "...", "benefits": "..."}`;
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.apiKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await response.json();
                        const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());
                        this.title = result.title.substring(0, 80); this.description = result.benefits;
                    } catch (e) { alert("AI Error"); } finally { this.loading = false; }
                },

                handleImage(action) {
                    const canvas = document.getElementById('infographicCanvas');
                    const ctx = canvas.getContext('2d');
                    this.drawOnCanvas(ctx);
                    if (action === 'download') {
                        const link = document.createElement('a');
                        link.download = `BazMart_SEO_Image.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } else if (action === 'copy') {
                        canvas.toBlob(blob => {
                            const item = new ClipboardItem({ "image/png": blob });
                            navigator.clipboard.write([item]).then(() => alert("Copied!"));
                        });
                    }
                },

                drawOnCanvas(ctx) {
                    ctx.fillStyle = '#002142'; ctx.fillRect(0, 0, 1200, 1200);
                    ctx.fillStyle = '#ffcc00'; ctx.fillRect(0, 0, 1200, 180);
                    ctx.fillStyle = '#002142'; ctx.font = 'bold 80px sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText(this.storeName.toUpperCase(), 600, 110);
                    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 44px sans-serif';
                    this.wrapText(ctx, this.title, 600, 280, 1050, 60);
                    const points = this.description.split('\n').filter(p => p.trim());
                    ctx.textAlign = 'left';
                    let currentY = 520;
                    points.forEach((point) => {
                        ctx.fillStyle = '#ffcc00'; ctx.fillRect(100, currentY - 45, 60, 60);
                        ctx.fillStyle = '#ffffff'; ctx.font = '500 38px sans-serif';
                        const lines = this.wrapText(ctx, point.replace(/[•*-]/g, '').trim(), 190, currentY, 900, 50);
                        currentY += (lines * 50) + 40;
                    });
                },

                wrapText(ctx, text, x, y, maxWidth, lineHeight) {
                    const words = text.split(' '); let line = ''; let count = 0;
                    for (let n = 0; n < words.length; n++) {
                        let testLine = line + words[n] + ' ';
                        if (ctx.measureText(testLine).width > maxWidth && n > 0) {
                            ctx.fillText(line, x, y); line = words[n] + ' '; y += lineHeight; count++;
                        } else { line = testLine; }
                    }
                    ctx.fillText(line, x, y); count++; return count;
                },

                generateHTML() {
                    return `<div style="font-family: sans-serif; background: #fff; padding: 25px; max-width: 850px; margin: 0 auto;">
                        <h1 style="color: #002142; text-align: center;">${this.storeName}</h1>
                        <h2 style="font-size: 20px; text-align: center;">${this.title}</h2>
                        <div style="background: #f8fafc; padding: 15px; margin-top: 20px; white-space: pre-line;">${this.description}</div>
                    </div>`;
                },

                copyToClipboard() {
                    const el = document.createElement('textarea'); el.value = this.generateHTML();
                    document.body.appendChild(el); el.select(); document.execCommand('copy');
                    document.body.removeChild(el); alert("HTML Copied!");
                }
            }
        }
    </script>
</body>
</html>
